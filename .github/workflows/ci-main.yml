name: CI - Main Branch

# This workflow runs on every push to main
# It ensures main branch stability

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1: Fast Quality Check
  quick-check:
    name: Quick Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
          npm ci
      
      - name: Run tests
        working-directory: ./backend
        run: npm test
        env:
          CI: true
          NODE_ENV: test

  # Job 2: Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        working-directory: ./backend
        run: |
          npm audit --audit-level=high || echo "⚠️ Security vulnerabilities found"
      
      - name: Check dependencies
        working-directory: ./backend
        run: |
          echo "📦 Checking for outdated dependencies..."
          npm outdated || true

  # Job 3: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quick-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
          npm ci
      
      - name: Verify build can start
        working-directory: ./backend
        timeout-minutes: 2
        run: |
          echo "🚀 Verifying server can start..."
          timeout 30s npm start || exit_code=$?
          if [ ${exit_code:-0} -eq 124 ]; then
            echo "✅ Server started successfully (timeout after 30s is expected)"
            exit 0
          elif [ ${exit_code:-0} -eq 0 ]; then
            echo "✅ Server started successfully"
            exit 0
          else
            echo "❌ Server failed to start"
            exit 1
          fi
        env:
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/test
          OPENAI_API_KEY: test_key_for_ci

  # Job 4: Notify on Failure
  notify-failure:
    name: Notify on CI Failure
    runs-on: ubuntu-latest
    needs: [quick-check, security-scan, build]
    if: failure()
    
    steps:
      - name: CI Failed
        run: |
          echo "❌ ================================"
          echo "❌ CI CHECKS FAILED ON MAIN BRANCH"
          echo "❌ ================================"
          echo ""
          echo "Main branch stability is compromised."
          echo "Please investigate and fix immediately."
          echo ""
          echo "Failed workflow: ${{ github.workflow }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "================================"
          exit 1

  # Job 5: Success Summary
  success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quick-check, security-scan, build]
    
    steps:
      - name: All checks passed
        run: |
          echo "✅ ================================"
          echo "✅ ALL CI CHECKS PASSED"
          echo "✅ ================================"
          echo ""
          echo "✓ Quick Check: PASSED"
          echo "✓ Security Scan: PASSED"
          echo "✓ Build Verification: PASSED"
          echo ""
          echo "Main branch is stable and healthy."
          echo "================================"
