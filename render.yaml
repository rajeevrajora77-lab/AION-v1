services:
  - type: web
    name: aion-backend-staging
    env: node
    region: singapore
    plan: starter
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging

  - type: web
    name: aion-backend-production
    env: node
    region: singapore
    plan: standard
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
